# Production Profile Configuration
spring.application.name=devflow-api

# Server Configuration
server.port=8080
server.error.include-message=always

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
# STRICTLY VALIDATE IN PRODUCTION, DO NOT USE UPDATE!
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Security
# MUST PROVIDE ENVIRONMENT VARIABLE IN PRODUCTION
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
# Set this to the actual frontend domain in production (e.g., https://devflow.io)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://devflow.io}
app.git.storage-path=${GIT_STORAGE_PATH:/devflow-git-storage}

# Actuator Security - Only expose health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/internal/actuator
management.server.port=8081

# Disable Open-In-View
spring.jpa.open-in-view=false